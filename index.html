<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Boardly</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="topbar">
    <h1 class="logo">Boardly</h1>

    <div class="tabs" id="tabs"></div>
  </header>

  <div class="toolbar">

      <button id="add-goal">+ Goal</button>
      <button id="add-task">+ Task</button>
      <button id="add-note">+ Note</button>
    </div>

    <button id="add-tab">+ Tab</button>
  </div>

  <main id="board"></main>

   <div class="trash-bin" id="trash-bin">
        🗑️
    </div>

  <script src="app.js"></script>
</body>
</html>
