<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Boardly</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

  <!-- Top Navigation Header -->
  <header class="topbar">
    <div class="header-nav-row">
      <h1 class="logo">Boardly</h1>
      
      <!-- Centers board tabs and manages overflow mask states -->
      <div class="tabs-wrapper" id="tabs-wrapper">
        <div class="tabs" id="tabs"></div>
      </div>

      <!-- Explicit Layout Spacer to enforce rigid padding before the action button -->
      <div class="header-spacer"></div>

      <!-- Placed directly in the row to anchor beautifully to the right edge -->
      <button id="add-tab" title="Add New Tab"><span>+</span> Tab</button>
    </div>
  </header>

  <!-- Main Grid Workspace Canvas -->
  <main id="board"></main>

  <!-- Floating Content Action Cluster (Bottom Right) -->
  <div class="floating-actions">
    <button id="add-goal" title="Add Goal"><span class="btn-icon goal-icon">+</span> Goal</button>
    <button id="add-task" title="Add Task"><span class="btn-icon task-icon">+</span> Task</button>
    <button id="add-note" title="Add Note"><span class="btn-icon note-icon">+</span> Note</button>
  </div>

  <!-- Floating Trash Dropzone (Far Bottom Right) -->
  <div class="trash-bin" id="trash-bin" title="Drag cards or tabs here to delete">
    <div class="trash-icon">🗑️</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
