<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LifeOS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="topbar">
    <h1>LifeOS</h1>

    <div class="tabs">
      <button class="tab active" data-board="health">Health</button>
      <button class="tab" data-board="work">Work</button>
      <button class="tab" data-board="finance">Finance</button>
      <button class="tab" data-board="relationships">Relationships</button>
      <button class="tab" data-board="ideas">Ideas</button>
    </div>
  </header>

  <div class="toolbar">
    <button id="add-goal">+ Goal</button>
    <button id="add-task">+ Task</button>
    <button id="add-note">+ Note</button>
  </div>

  <main id="board"></main>

  <script src="app.js"></script>
</body>
</html>
